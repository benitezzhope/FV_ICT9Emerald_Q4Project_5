<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  overflow-x: hidden;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-image: url('profilebackground.jpg');
  background-repeat: no-repeat;
  background-size: cover;
}

/* SIDEBAR */
.sidenav {
  height: 100%;
  width: 200px;
  position: fixed;
  top: 0;
  left: 0;
  background-color: #ffffff;
  padding-top: 20px;
}

.sidenav a {
  display: block;
  padding: 12px 16px;
  font-size: 18px;
  line-height: 1.4;
  color: #4671aa;
  text-decoration: none;
}

.sidenav a:hover {
  background-color: #e9e9e9;
}

.main-content {
  margin-left: 200px;
  min-height: 100vh;
  padding: 20px 30px 10px;
  display: flex;
  justify-content: center;
  box-sizing: border-box;
  backdrop-filter: blur(5px);
}

.main-content::before {
  content: "";
  position: absolute;
  inset: 0;
  backdrop-filter: blur(6px);
  z-index: -1;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
  max-width: 600px;
  width: 100%;
}

.card {
  background: #ffffff;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
  height: 300px;
}

.avatar {
  width: 120px;
  height: 120px;
  margin: 0 auto 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 44px;
}

h2 {
  margin: 0 0 10px;
  font-size: 24px;
}

p {
  margin: 0 0 16px;
  color: #555;
}

.upload,
.button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 18px;
  border-radius: 8px;
  background: #e98b06;
  color: #fff;
  text-decoration: none;
  border: none;
  cursor: pointer;
  font-size: 14px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  background: #eef4ff;
  border-radius: 10px;
  margin-bottom: 10px;
  color: #333;
}
</style>
</head>

<body>

<div class="sidenav">
  <center>
    <img src="image-removebg-preview (3).png" style="height: 100px; width: 130px; border-radius: 5px;">
  </center>

  <a href="dashboard.html">Dashboard</a>
  <a href="notebooks.html">Virtual Notebook</a>
  <a href="tasks.html">Tasks</a>
  <a href="profile.html">Profile</a>
  <a href="index.html">Logout</a>
</div>

<div class="main-content">
  <div class="grid">

    <div class="card">
      <div class="avatar">
        <img src="bakugo.gif" style="  width: 120px; height: 120px; border-radius: 50%; object-fit: cover;">
      </div>
      <h2>Profile</h2>
      <p style="padding-bottom: 20px;">Bakugo Katsuki. Year 1, emitter-type explosion from sweat. I'm gonna replace All Might. I'm better than all of you nerds.</p>
     
      <label class="upload">
        Edit profile
      </label>
    </div>

    <div class="card">
      <h2>Details</h2>
      <div class="info-row"><div>ID</div><div>UA-0017</div></div>
      <div class="info-row"><div>Phone</div><div>+81-90-EXP-BOOM</div></div>
      <div class="info-row"><div>Email</div><div>bakugo.katsuki@hero.ua.jp</div></div>
      <div class="info-row"><div>Gender</div><div>Male</div></div>
      <a href="" class="button">Change details</a>
      <a href="index.html" class="button">Change password</a>
    </div>

  </div>
</div>

</body>
</html>
