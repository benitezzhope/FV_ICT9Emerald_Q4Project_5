<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f5f8;
            color: #222;
        }

        .sidenav {
            position: fixed;
            top: 0;
            left: 0;
            width: 200px;
            height: 100%;
            background: #fff;
            padding: 24px 16px;
            box-shadow: 1px 0 8px rgba(0, 0, 0, 0.08);
        }

        .sidenav img {
            display: block;
            margin: 0 auto 18px;
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
        }

        .sidenav a {
            display: block;
            margin: 12px 0;
            color: #4671aa;
            text-decoration: none;
            font-size: 17px;
        }

        .sidenav a:hover,
        .sidenav a.active {
            color: #1b4f8f;
        }

        .main-content {
            margin-left: 220px;
            padding: 40px;
            min-height: 100vh;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .card {
            background: #fff;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.06);
            width: 100%;
            min-height: 300px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0366d6;
            color: #fff;
            font-size: 44px;
        }

        h2 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        p {
            margin: 0 0 16px;
            color: #555;
        }

        .upload,
        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 8px;
            background: #0366d6;
            color: #fff;
            text-decoration: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: #eef4ff;
            border-radius: 10px;
            margin-bottom: 10px;
            color: #333;
        }

    </style>
</head>
<body>
    <div class="sidenav">
        <img src="Josubera.png" alt="Profile Logo">
        <a href="dashboard.html">Dashboard</a>
        <a href="notebooks.html">Virtual Notebook</a>
        <a href="tasks.html">Tasks</a>
        <a href="profile.html" class="active">Profile</a>
        <a href="index.html">Logout</a>
    </div>

    <div class="main-content">
        <div class="grid">
            <div class="card">
                <div class="avatar">?</div>
                <h2>Profile</h2>
                <p>Student information</p>
                <label class="upload">
                    Change photo
                    <input type="file" accept="image/*" style="display:none">
                </label>
            </div>

            <div class="card">
                <h2>Details</h2>
                <div class="info-row"><div>ID</div><div>?</div></div>
                <div class="info-row"><div>Phone</div><div>+?</div></div>
                <div class="info-row"><div>Email</div><div>@montessori.edu.ph</div></div>
                <div class="info-row"><div>Gender</div><div>?</div></div>
                <a href="index.html" class="button">Change password</a>
            </div>
        </div>
    </div>
</body>
</html>
